name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    name: build + test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - name: Type-check + build (project references)
        run: npm run build
      - name: Test (node:test across all packages)
        run: npm test

  dogfood:
    name: qScan self-scan (dogfood)
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build
      # Exercise the CLI on our own tree. Informational only and never gating:
      # qScan correctly matches the crypto PATTERNS embedded in the detectors'
      # own source (e.g. the PEM regex), so a non-zero exit here is expected.
      - run: node packages/qscan/dist/cli.js packages || true
